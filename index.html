<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premier Schools Exhibition Navigation Setup</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header" id="dynamic-navbar">
      <div class="header-container">
        <div class="logo-wrapper">
          <img
            src="assets/logo.png"
            alt="Premier Schools Exhibition"
            class="site-logo"
          />
        </div>
        <nav class="header-navigation">
          <a href="#register" class="action-btn-stateful">
            <span class="btn-split-arrow"></span>
            <span class="btn-core-text" id="btn-text-node">REGISTER NOW</span>
          </a>
        </nav>
      </div>
    </header>

    <section class="hero-section">
      <div class="hero-container">
        <div class="hero-info-column">
          <h1 class="hero-main-title">
            Discover Gurugram’s <br />
            <span class="highlight-gold-entire">Top 30+ Schools</span>
          </h1>
          <p class="hero-subtitle">ALL IN ONE PLACE</p>

          <div class="venue-date-badge">
            <div class="badge-venue">
              <strong>Apparel House,</strong>
              <span>Sec 44, Gurugram</span>
            </div>
            <div class="badge-divider"></div>
            <div class="badge-time">
              <strong>2-3 August 2025</strong>
              <span>Sat-Sun | 10AM - 6PM</span>
            </div>
          </div>
        </div>

        <div class="hero-mosaic-column">
          <div class="mosaic-vertical-track track-move-up">
            <div class="mosaic-pill">
              <img src="assets/image1.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image2.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image3.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image4.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image1.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image2.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image3.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image4.png" alt="" />
            </div>
          </div>

          <div class="mosaic-vertical-track track-move-down">
            <div class="mosaic-pill">
              <img src="assets/image5.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image6.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image7.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image8.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image5.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image6.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image7.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image8.png" alt="" />
            </div>
          </div>

          <div class="mosaic-vertical-track track-move-up">
            <div class="mosaic-pill">
              <img src="assets/image9.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image10.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image11.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image12.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image9.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image10.jpg" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image11.png" alt="" />
            </div>
            <div class="mosaic-pill">
              <img src="assets/image12.jpg" alt="" />
            </div>
          </div>
        </div>

        <div class="hero-form-column">
          <div class="enquiry-card-wrapper">
            <h2 class="enquiry-card-title">Enquire Now</h2>
            <form id="lead-capture-form" class="enquiry-form">
              <div class="form-input-group">
                <input
                  type="text"
                  id="parent-name"
                  placeholder="Parent's Name"
                  required
                />
              </div>
              <div class="form-input-group">
                <input
                  type="tel"
                  id="phone-number"
                  placeholder="Phone number"
                  required
                />
              </div>
              <div class="form-input-group">
                <input
                  type="text"
                  id="grade-target"
                  placeholder="Which grade are you looking for?"
                  required
                />
              </div>

              <div class="submit-action-row">
                <button type="submit" class="form-submit-btn-compact">
                  <span class="btn-arrow-box">↗</span>
                  <span class="btn-text-box">SUBMIT</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script src="js/main.js"></script>
  </body>
</html>
